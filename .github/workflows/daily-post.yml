name: Hourly podcast digest

# Runs every hour, offset from the top of the hour. GitHub's own docs warn
# that schedule triggers queued for exactly :00 (the busiest minute across
# all of GitHub Actions) can be delayed or dropped under load -- confirmed
# in practice here: only 2 of the ~10 expected hourly runs between 11:21 and
# 21:20 UTC on 2026-07-07 actually fired. Minute 7 avoids that peak.
on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch: {} # allows manually triggering a run from the Actions tab

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the agent (phase 1 + one backlog episode)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python main.py

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-log
          path: agent.log
