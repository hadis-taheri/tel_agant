name: Hourly podcast digest

# GitHub's `schedule` trigger has turned out to be unreliable for this repo
# well beyond the documented "avoid :00" congestion advice: even after
# moving off the top of the hour to :07, the very next scheduled run still
# didn't fire (checked directly against the Actions API -- 40+ minutes
# overdue with nothing queued). GitHub schedule triggers are explicitly
# "best effort" with no SLA and can simply be dropped. Mitigation: fire 4
# times an hour instead of once, all offset from the common :00/:15/:30/:45
# marks, so a single dropped tick doesn't mean an hour with no run at all.
# main.py's own logic (dedup by source+external_id, one backlog episode per
# invocation) makes extra runs harmless if more than one lands in the same
# hour -- it just makes the backlog advance a bit faster, not double-post.
on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {} # allows manually triggering a run from the Actions tab

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the agent (phase 1 + one backlog episode)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python main.py

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-log
          path: agent.log
